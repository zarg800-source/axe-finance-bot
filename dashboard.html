<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mike Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:        #07090f;
  --surface:   #0f1320;
  --surface2:  #141926;
  --border:    rgba(255,255,255,0.06);
  --bord-gold: rgba(240,180,41,0.28);
  --gold:      #f0b429;
  --gold-glow: rgba(240,180,41,0.09);
  --green:     #1fd6a0;
  --green-dim: rgba(31,214,160,0.1);
  --red:       #f0645a;
  --red-dim:   rgba(240,100,90,0.1);
  --text:      #dde3ed;
  --text-mid:  #8896a8;
  --text-dim:  #4a566a;
  --display:   'Anton', sans-serif;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Outfit', sans-serif;
  --r:         14px;
  --rsm:       9px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;max-width:100vw;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  font-size:15px;font-weight:300;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* bg */
.bg-glow{
  position:fixed;top:-180px;left:50%;transform:translateX(-50%);
  width:min(700px,100vw);height:360px;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse,rgba(240,180,41,0.05) 0%,transparent 70%);
}
.bg-grid{
  position:fixed;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(240,180,41,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,180,41,0.022) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse at 50% 0%,black 20%,transparent 75%);
}

/* layout */
.wrap{
  max-width:1100px;margin:0 auto;padding:0 20px 80px;
  position:relative;z-index:1;
}

/* header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:32px 0 28px;border-bottom:1px solid var(--border);margin-bottom:40px;
}
.logo{font-family:var(--display);font-size:28px;letter-spacing:.06em;color:var(--text)}
.logo span{color:var(--gold)}
.hdr-right{text-align:right}
.hdr-date{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
.hdr-live{
  display:inline-flex;align-items:center;gap:6px;margin-top:5px;
  font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.1em;
}
.live-dot{
  width:5px;height:5px;border-radius:50%;background:var(--green);
  animation:blink 2.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* section label */
.sec{
  font-family:var(--mono);font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--text-mid);font-weight:600;
  margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* card */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:22px 20px;
  opacity:0;transform:translateY(14px);
  transition:opacity .4s ease,transform .4s ease,border-color .3s,box-shadow .3s;
}
.card.in{opacity:1;transform:translateY(0)}
.card:hover{border-color:var(--bord-gold);box-shadow:0 4px 32px rgba(240,180,41,.05)}

/* balances */
.bal-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;margin-bottom:40px;
}
.bal-card{position:relative;overflow:hidden}
.glow-c{
  position:absolute;top:-24px;right:-24px;width:90px;height:90px;
  background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);
  pointer-events:none;
}
.bal-acct{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-mid);font-weight:600;margin-bottom:12px;
}
.bal-num{font-family:var(--mono);font-size:20px;font-weight:400;letter-spacing:-.02em;color:var(--text)}
.bal-num .cur{font-size:12px;color:var(--gold);margin-right:1px}
.bal-total{border-color:rgba(240,180,41,.2);background:linear-gradient(135deg,#0d1220,#111b2c)}
.bal-total .bal-num{color:var(--gold)}

/* summary */
.sum-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;margin-bottom:40px;align-items:stretch;
}
.sum-grid .card{display:flex;flex-direction:column}
.sum-lbl{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-mid);font-weight:600;margin-bottom:10px;
}
.sum-val{
  font-family:var(--mono);font-size:20px;font-weight:400;
  letter-spacing:-.02em;word-break:break-all;flex:1;
}
.sum-val.c-inc{color:var(--green)}
.sum-val.c-exp{color:var(--red)}
.sum-val.c-pos{color:var(--gold)}
.sum-val.c-neg{color:var(--red)}
.sum-chg{margin-top:8px;font-size:11px;font-family:var(--mono);color:var(--text-dim)}
.sum-chg.up{color:var(--green)}
.sum-chg.down{color:var(--red)}

/* charts */
.charts-row{
  display:grid;grid-template-columns:1fr 1.6fr;
  gap:14px;margin-bottom:40px;
  align-items:start;
}
/* Both chart cards fixed same height so they match each other */
#card-cat, #card-trend{
  height:340px;
  display:flex;flex-direction:column;
}
#card-cat .chart-canvas-wrap  { flex:1; min-height:0; position:relative; }
#card-trend .chart-canvas-wrap { flex:1; min-height:0; position:relative; }
.chart-ttl{font-family:var(--display);font-size:18px;letter-spacing:.05em;color:var(--text);margin-bottom:18px}
.cat-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);
}
.cat-row:last-child{border-bottom:none}
.cat-left{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-mid)}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-amt{font-family:var(--mono);font-size:13px;color:var(--text)}

/* transactions */
.txn-list{display:flex;flex-direction:column}
.txn{
  display:flex;align-items:center;gap:12px;
  padding:12px 8px;border-radius:var(--rsm);transition:background .18s;
}
.txn:hover{background:var(--surface2)}
.txn-icon{
  width:38px;height:38px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.txn-icon.inc{background:var(--green-dim)}
.txn-icon.exp{background:var(--red-dim)}
.txn-body{flex:1;min-width:0}
.txn-desc{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-meta{font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-top:3px}
.txn-amt{font-family:var(--mono);font-size:14px;font-weight:500;white-space:nowrap;flex-shrink:0}
.txn-amt.inc{color:var(--green)}
.txn-amt.exp{color:var(--red)}

/* expand btn */
.xbtn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;margin-top:12px;padding:11px;
  background:none;border:1px solid var(--border);border-radius:var(--rsm);
  cursor:pointer;font-family:var(--mono);font-size:11px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);
  transition:border-color .2s,color .2s;
}
.xbtn:hover{border-color:var(--bord-gold);color:var(--gold)}
.xarrow{display:inline-block;transition:transform .3s}
.xarrow.open{transform:rotate(180deg)}

/* ═══════════════════════════════════════════════════════
   MONTHLY HISTORY
   ═══════════════════════════════════════════════════════ */
.hist-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:22px;
}
.hist-btn{
  width:44px;height:44px;border-radius:var(--rsm);
  border:1px solid var(--border);background:none;
  color:var(--text-mid);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:border-color .2s,color .2s,background .15s;
  /* generous tap target on mobile */
  -webkit-tap-highlight-color:rgba(240,180,41,.15);
  touch-action:manipulation;
  user-select:none;
}
.hist-btn:not([disabled]):hover{border-color:var(--bord-gold);color:var(--gold);background:var(--gold-glow)}
.hist-btn:not([disabled]):active{background:rgba(240,180,41,.18)}
.hist-btn[disabled]{opacity:.2;cursor:default;pointer-events:none}
.hist-month{
  font-family:var(--display);font-size:22px;
  letter-spacing:.05em;color:var(--text);text-align:center;flex:1;padding:0 10px;
}
.hist-sum{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-bottom:24px;
}
.hbox{background:var(--surface2);border-radius:var(--rsm);padding:12px 10px;min-width:0;overflow:hidden}
.hbox-lbl{
  font-family:var(--mono);font-size:10px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-mid);font-weight:600;margin-bottom:6px;
}
.hbox-val{font-family:var(--mono);font-size:15px;font-weight:400;word-break:break-all}
.hbox-val.c-inc{color:var(--green)}
.hbox-val.c-exp{color:var(--red)}
.hbox-val.c-pos{color:var(--gold)}
.hbox-val.c-neg{color:var(--red)}
.hist-sub{
  font-family:var(--mono);font-size:10px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--text-mid);font-weight:600;
  padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid var(--border);
}
.hbar{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.hbar:last-child{border-bottom:none}
.hbar-name{font-size:13px;color:var(--text-mid);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{flex:1;height:5px;background:var(--surface2);border-radius:99px;overflow:hidden}
.hbar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.hbar-amt{font-family:var(--mono);font-size:12px;color:var(--text);width:80px;text-align:right;flex-shrink:0}
.hempty{
  font-family:var(--mono);font-size:12px;color:var(--text-dim);
  letter-spacing:.08em;padding:20px 0;text-align:center;
}
.hloading{
  font-family:var(--mono);font-size:12px;color:var(--text-dim);
  letter-spacing:.08em;padding:16px 0;text-align:center;
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* footer */
footer{
  border-top:1px solid var(--border);padding-top:24px;text-align:center;
  font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:.08em;
}

/* responsive */
@media(max-width:800px){.charts-row{grid-template-columns:1fr}}
@media(max-width:560px){
  .sum-grid{grid-template-columns:1fr}
  .bal-grid{grid-template-columns:repeat(2,1fr)}
  .wrap{padding:0 14px 60px}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">Mike <span>Finance</span></div>
    <div class="hdr-right">
      <div class="hdr-date" id="hdr-date">—</div>
      <div class="hdr-live"><span class="live-dot"></span> LIVE</div>
    </div>
  </header>

  <!-- Balances -->
  <div class="sec">Account Balances</div>
  <div class="bal-grid" id="bal-grid">
    <div style="color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:20px 0">Loading…</div>
  </div>

  <!-- This Month -->
  <div class="sec">This Month</div>
  <div class="sum-grid" id="sum-grid">
    <div style="color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:20px 0;grid-column:1/-1">Loading…</div>
  </div>

  <!-- Analytics -->
  <div class="sec">Analytics</div>
  <div class="charts-row">
    <div class="card" id="card-cat">
      <div class="chart-ttl">Spending Categories</div>
      <div class="chart-canvas-wrap"><canvas id="c-donut"></canvas></div>
      <div id="cat-list" style="margin-top:12px"></div>
    </div>
    <div class="card" id="card-trend">
      <div class="chart-ttl">6-Month Overview</div>
      <div class="chart-canvas-wrap"><canvas id="c-bar"></canvas></div>
    </div>
  </div>

  <!-- Recent Transactions -->
  <div class="sec">Recent Transactions</div>
  <div class="card" id="card-txn">
    <div class="txn-list" id="txn-latest">
      <div style="color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center">Loading…</div>
    </div>
    <div id="txn-older-wrap" style="display:none">
      <div class="txn-list" id="txn-older"></div>
    </div>
    <button class="xbtn" id="xbtn" style="display:none">
      <span id="xlbl">Show older transactions</span>
      <span class="xarrow" id="xarrow">▼</span>
    </button>
  </div>

  <!-- Monthly History -->
  <div class="sec" style="margin-top:40px">Monthly History</div>
  <div class="card in" id="card-hist">

    <div class="hist-nav">
      <button class="hist-btn" id="btn-prev">&#8592;</button>
      <div class="hist-month" id="hist-lbl">—</div>
      <button class="hist-btn" id="btn-next">&#8594;</button>
    </div>

    <div class="hist-sum">
      <div class="hbox">
        <div class="hbox-lbl">Income</div>
        <div class="hbox-val c-inc" id="h-inc">—</div>
      </div>
      <div class="hbox">
        <div class="hbox-lbl">Expenses</div>
        <div class="hbox-val c-exp" id="h-exp">—</div>
      </div>
      <div class="hbox">
        <div class="hbox-lbl">Net</div>
        <div class="hbox-val" id="h-net">—</div>
      </div>
    </div>

    <div class="hist-sub">Spending Breakdown</div>
    <div id="h-cats"><div class="hloading">Loading…</div></div>

    <div class="hist-sub" style="margin-top:22px">All Transactions</div>
    <div class="txn-list" id="h-txns"></div>

  </div>

  <footer>Mike Finance &middot; Bangkok Time &middot; Built with Claude</footer>
</div>

<script>
// ─── Helpers ─────────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }

function fmt(n) {
  return '\u0e3f' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function countUp(node, target, prefix, ms) {
  var t0 = performance.now();
  (function tick(now) {
    var p  = Math.min((now - t0) / ms, 1);
    var ep = 1 - Math.pow(1 - p, 3);
    node.textContent = prefix + (target * ep).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    if (p < 1) requestAnimationFrame(tick);
  })(performance.now());
}

function reveal(nodes, delay) {
  nodes.forEach(function(n, i) {
    setTimeout(function() { n.classList.add('in'); }, (delay || 0) + i * 60);
  });
}

var MNAMES = ['','January','February','March','April','May','June',
              'July','August','September','October','November','December'];

var PALETTE = ['#f0b429','#1fd6a0','#7b6ffc','#f0645a','#4dc4ff','#ffb347','#b4e4a2','#ffd3b6'];

var CEMOJI = {
  'Food & Drinks':'🍜','Coffee':'☕','Transport':'🚕','Groceries':'🛒',
  'Housing':'🏠','Health':'💊','Shopping':'👗','Entertainment':'🎉',
  'Subscriptions':'📱','Travel':'✈️','School':'🎓','Cigarettes':'🚬',
  'Other':'🧾','Salary':'💵','Freelance':'💼','Gallery Sales':'🖼️',
  'Artwork / Commission':'🎨','Bonus':'🏆','Gift Money':'🎁',
  'Cashback / Refund':'💳','Investment':'💹','Business':'🤝','Other Income':'🧾'
};

Chart.defaults.color = '#4a566a';
Chart.defaults.font.family = "'JetBrains Mono', monospace";

// Date header
(function() {
  var opts = {timeZone:'Asia/Bangkok',weekday:'short',year:'numeric',month:'long',day:'numeric'};
  el('hdr-date').textContent = new Date().toLocaleDateString('en-US', opts).toUpperCase();
})();

// ─── Balances ─────────────────────────────────────────────────────────────────
async function loadBalances() {
  var data  = await fetch('/api/balances').then(function(r) { return r.json(); });
  var total = data.reduce(function(s, a) { return s + a.balance; }, 0);

  el('bal-grid').innerHTML = data.map(function(a) {
    return '<div class="card bal-card">' +
      '<div class="glow-c"></div>' +
      '<div class="bal-acct">' + a.name + '</div>' +
      '<div class="bal-num" data-v="' + a.balance + '"><span class="cur">\u0e3f</span><span class="n">—</span></div>' +
    '</div>';
  }).join('') +
  '<div class="card bal-card bal-total">' +
    '<div class="glow-c"></div>' +
    '<div class="bal-acct">Net Worth</div>' +
    '<div class="bal-num" data-v="' + total + '"><span class="cur">\u0e3f</span><span class="n">—</span></div>' +
  '</div>';

  reveal(Array.from(el('bal-grid').querySelectorAll('.card')));
  setTimeout(function() {
    el('bal-grid').querySelectorAll('.bal-num').forEach(function(node) {
      countUp(node.querySelector('.n'), parseFloat(node.dataset.v), '', 1200);
    });
  }, 80);
}

// ─── Summary ─────────────────────────────────────────────────────────────────
async function loadSummary() {
  var resp = await fetch('/api/summary').then(function(r) { return r.json(); });
  var cur  = resp.this_month;
  var prev = resp.last_month;

  function delta(c, p, inv) {
    if (!p) return '';
    var d   = ((c - p) / Math.abs(p) * 100).toFixed(1);
    var up  = inv ? d < 0 : d > 0;
    return '<div class="sum-chg ' + (up ? 'up' : 'down') + '">' +
      (d > 0 ? '↑' : '↓') + ' ' + Math.abs(d) + '% vs last month</div>';
  }

  el('sum-grid').innerHTML =
    '<div class="card"><div class="sum-lbl">Income</div>' +
    '<div class="sum-val c-inc" data-v="' + cur.income + '">\u0e3f—</div>' + delta(cur.income, prev.income) + '</div>' +
    '<div class="card"><div class="sum-lbl">Expenses</div>' +
    '<div class="sum-val c-exp" data-v="' + cur.expense + '">\u0e3f—</div>' + delta(cur.expense, prev.expense, true) + '</div>' +
    '<div class="card"><div class="sum-lbl">Net Savings</div>' +
    '<div class="sum-val ' + (cur.net >= 0 ? 'c-pos' : 'c-neg') + '" data-v="' + Math.abs(cur.net) + '">' +
    (cur.net < 0 ? '-' : '') + '\u0e3f—</div>' + delta(cur.net, prev.net) + '</div>';

  reveal(Array.from(el('sum-grid').querySelectorAll('.card')), 80);
  setTimeout(function() {
    el('sum-grid').querySelectorAll('.sum-val').forEach(function(node) {
      var neg = node.textContent.startsWith('-');
      countUp(node, parseFloat(node.dataset.v), neg ? '-\u0e3f' : '\u0e3f', 1200);
    });
  }, 200);
}

// ─── Categories donut ─────────────────────────────────────────────────────────
async function loadCategories() {
  var cats = await fetch('/api/categories').then(function(r) { return r.json(); });
  el('card-cat').classList.add('in');
  if (!cats.length) {
    el('cat-list').innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:16px 0;font-family:var(--mono)">No expense data this month</div>';
    return;
  }
  new Chart(el('c-donut').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: cats.map(function(c) { return c.category; }),
      datasets: [{ data: cats.map(function(c) { return c.total; }), backgroundColor: PALETTE, borderWidth: 0, hoverOffset: 5 }]
    },
    options: {
      cutout: '72%', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: function(ctx) { return '  ' + fmt(ctx.raw); } },
          backgroundColor: '#0c0f18', borderColor: 'rgba(240,180,41,.2)', borderWidth: 1,
          titleColor: '#dde3ed', bodyColor: '#8896a8', padding: 10, cornerRadius: 8
        }
      }
    }
  });
  el('cat-list').innerHTML = cats.slice(0, 6).map(function(c, i) {
    return '<div class="cat-row">' +
      '<div class="cat-left"><span class="cat-dot" style="background:' + PALETTE[i] + '"></span>' +
      (CEMOJI[c.category] || '🧾') + ' ' + c.category + '</div>' +
      '<span class="cat-amt">' + fmt(c.total) + '</span></div>';
  }).join('');
}

// ─── Bar chart ────────────────────────────────────────────────────────────────
async function loadMonthly() {
  var data = await fetch('/api/monthly').then(function(r) { return r.json(); });
  el('card-trend').classList.add('in');
  new Chart(el('c-bar').getContext('2d'), {
    type: 'bar',
    data: {
      labels: data.map(function(d) { return d.month; }),
      datasets: [
        { label: 'Income',  data: data.map(function(d) { return d.income; }),  backgroundColor: 'rgba(31,214,160,.65)', borderRadius: 5, borderSkipped: false },
        { label: 'Expense', data: data.map(function(d) { return d.expense; }), backgroundColor: 'rgba(240,100,90,.65)',  borderRadius: 5, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { font: { size: 11 }, boxWidth: 10, boxHeight: 10, color: '#8896a8', usePointStyle: true } },
        tooltip: {
          callbacks: { label: function(ctx) { return '  ' + ctx.dataset.label + ': ' + fmt(ctx.raw); } },
          backgroundColor: '#0c0f18', borderColor: 'rgba(240,180,41,.2)', borderWidth: 1,
          titleColor: '#dde3ed', bodyColor: '#8896a8', padding: 10, cornerRadius: 8
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { font: { size: 11 }, color: '#4a566a' } },
        y: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { font: { size: 11 }, color: '#4a566a',
          callback: function(v) { return '\u0e3f' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v); }
        }}
      }
    }
  });
}

// ─── Transactions ─────────────────────────────────────────────────────────────
function buildRows(txns) {
  return txns.map(function(t) {
    var isInc = t.type === 'income';
    var emoji = CEMOJI[t.category] || (isInc ? '💵' : '💸');
    var ts    = (t.timestamp || '').substring(0, 16).replace('T', ' ');
    var cls   = isInc ? 'inc' : 'exp';
    return '<div class="txn">' +
      '<div class="txn-icon ' + cls + '">' + emoji + '</div>' +
      '<div class="txn-body">' +
        '<div class="txn-desc">' + (t.description || '') + '</div>' +
        '<div class="txn-meta">' + (t.category || '') + ' · ' + (t.account || '') + ' · ' + ts + '</div>' +
      '</div>' +
      '<div class="txn-amt ' + cls + '">' + (isInc ? '+' : '−') + fmt(t.amount) + '</div>' +
    '</div>';
  }).join('');
}

async function loadTransactions() {
  var txns = await fetch('/api/transactions').then(function(r) { return r.json(); });
  el('card-txn').classList.add('in');
  if (!txns.length) {
    el('txn-latest').innerHTML = '<div style="color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center">No transactions yet</div>';
    return;
  }
  el('txn-latest').innerHTML = buildRows(txns.slice(0, 1));
  if (txns.length > 1) {
    el('txn-older').innerHTML = buildRows(txns.slice(1));
    var btn = el('xbtn');
    btn.style.display = 'flex';
    btn.addEventListener('click', function() {
      var wrap  = el('txn-older-wrap');
      var arrow = el('xarrow');
      var lbl   = el('xlbl');
      var open  = wrap.style.display === 'none';
      wrap.style.display = open ? 'block' : 'none';
      arrow.classList.toggle('open', open);
      lbl.textContent = open ? 'Hide older transactions' : 'Show older transactions';
    });
  }
}

// ─── Monthly History ──────────────────────────────────────────────────────────
//
// Build 3 months: [0]=current, [1]=last month, [2]=two months ago
// idx=0 → newest, idx=2 → oldest
// btn-prev (←) goes to OLDER → increases idx
// btn-next (→) goes to NEWER → decreases idx
//
var HIST = (function() {
  var list = [];
  var d    = new Date();
  for (var i = 0; i < 3; i++) {
    var m = d.getMonth() + 1 - i;   // JS months are 0-based
    var y = d.getFullYear();
    if (m <= 0) { m += 12; y--; }
    list.push({ year: y, month: m });
  }
  return list;
}());

var hIdx = 0;  // start at current month

function hUpdateBtns() {
  // ← prev = go back in time = higher index
  el('btn-prev').disabled = (hIdx >= HIST.length - 1);
  // → next = go forward in time = lower index
  el('btn-next').disabled = (hIdx <= 0);
}

async function hRender() {
  var entry = HIST[hIdx];
  var year  = entry.year;
  var month = entry.month;

  el('hist-lbl').textContent  = MNAMES[month] + ' ' + year;
  el('h-inc').textContent     = '…';
  el('h-exp').textContent     = '…';
  el('h-net').textContent     = '…';
  el('h-cats').innerHTML      = '<div class="hloading">Loading…</div>';
  el('h-txns').innerHTML      = '';
  hUpdateBtns();

  var data;
  try {
    var res = await fetch('/api/month/' + year + '/' + month);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (e) {
    el('h-inc').textContent  = '\u0e3f0.00';
    el('h-exp').textContent  = '\u0e3f0.00';
    el('h-net').textContent  = '\u0e3f0.00';
    el('h-cats').innerHTML   = '<div class="hempty">No data for this month</div>';
    return;
  }

  el('h-inc').textContent = fmt(data.income);
  el('h-exp').textContent = fmt(data.expense);

  var netEl = el('h-net');
  netEl.textContent = (data.net < 0 ? '−' : '') + fmt(Math.abs(data.net));
  netEl.className   = 'hbox-val ' + (data.net >= 0 ? 'c-pos' : 'c-neg');

  if (data.categories && data.categories.length) {
    var mx = data.categories[0].total || 1;
    el('h-cats').innerHTML = data.categories.map(function(cat, i) {
      var pct = ((cat.total / mx) * 100).toFixed(1);
      return '<div class="hbar">' +
        '<div class="hbar-name">' + (CEMOJI[cat.category] || '🧾') + ' ' + cat.category + '</div>' +
        '<div class="hbar-track"><div class="hbar-fill" style="width:' + pct + '%;background:' + PALETTE[i % PALETTE.length] + '"></div></div>' +
        '<div class="hbar-amt">' + fmt(cat.total) + '</div>' +
      '</div>';
    }).join('');
  } else {
    el('h-cats').innerHTML = '<div class="hempty">No expenses this month</div>';
  }

  el('h-txns').innerHTML = (data.transactions && data.transactions.length)
    ? buildRows(data.transactions)
    : '<div class="hempty">No transactions this month</div>';
}

// Wire arrow buttons with addEventListener (most reliable on mobile)
document.addEventListener('DOMContentLoaded', function() {

  el('btn-prev').addEventListener('click', function() {
    if (hIdx < HIST.length - 1) {
      hIdx++;
      hRender();
    }
  });

  el('btn-next').addEventListener('click', function() {
    if (hIdx > 0) {
      hIdx--;
      hRender();
    }
  });

  // Render current month immediately
  hRender();

  // Load rest of dashboard
  Promise.all([
    loadBalances(),
    loadSummary(),
    loadCategories(),
    loadMonthly(),
    loadTransactions()
  ]).catch(function(err) { console.error('Dashboard error:', err); });

});
</script>
