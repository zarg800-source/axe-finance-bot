<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Axe Finance — Axe</title>
<!-- Inline theme script — runs BEFORE body renders to prevent flash -->
<script>
(function(){
  var s=localStorage.getItem('mf-theme');
  var sys=window.matchMedia('(prefers-color-scheme:dark)').matches;
  document.documentElement.setAttribute('data-theme', s||(sys?'dark':'light'));
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ───────────────────────────────────────────── */
:root {
  --radius-card: 18px;
  --radius-pill: 999px;
  --transition: .22s cubic-bezier(.4,0,.2,1);
}

[data-theme="light"] {
  --bg:        #f5f5f7;
  --bg2:       #ffffff;
  --bg3:       #fafafa;
  --nav-bg:    #1d1d1f;
  --nav-text:  #ffffff;
  --card-bg:   #ffffff;
  --card-border: rgba(0,0,0,.06);
  --text:      #1d1d1f;
  --text2:     #6e6e73;
  --text3:     #aeaeb2;
  --divider:   rgba(0,0,0,.06);
  --badge-bg:  #f5f5f7;
  --up:        #34c759;
  --down:      #ff3b30;
  --input-bg:  #f5f5f7;
  --input-border: rgba(0,0,0,.12);
  --input-border-focus: rgba(0,0,0,.35);
  --user-bubble-bg: #1d1d1f;
  --user-bubble-text: #ffffff;
  --axe-bubble-bg: #ffffff;
  --axe-bubble-border: rgba(0,0,0,.08);
  --axe-bubble-text: #1d1d1f;
  --thinking-bg: #ffffff;
  --status-online: #34c759;
  --status-thinking: #ff9500;
  --send-bg: #1d1d1f;
  --send-icon: #ffffff;
  --qp-bg: #f5f5f7;
  --qp-border: rgba(0,0,0,.1);
  --qp-text: #6e6e73;
  --qp-hover-bg: #1d1d1f;
  --qp-hover-text: #ffffff;
  --back-btn-bg: #f5f5f7;
  --back-btn-color: #6e6e73;
  --back-btn-hover: #1d1d1f;
  --back-btn-hover-text: #ffffff;
  --shadow: 0 4px 24px rgba(0,0,0,.07);
}

[data-theme="dark"] {
  --bg:        #000000;
  --bg2:       #1c1c1e;
  --bg3:       #2c2c2e;
  --nav-bg:    #f5f5f7;
  --nav-text:  #1d1d1f;
  --card-bg:   #1c1c1e;
  --card-border: rgba(255,255,255,.08);
  --text:      #f5f5f7;
  --text2:     #aeaeb2;
  --text3:     #636366;
  --divider:   rgba(255,255,255,.08);
  --badge-bg:  rgba(255,255,255,.1);
  --up:        #30d158;
  --down:      #ff453a;
  --input-bg:  #2c2c2e;
  --input-border: rgba(255,255,255,.1);
  --input-border-focus: rgba(255,255,255,.35);
  --user-bubble-bg: #f5f5f7;
  --user-bubble-text: #1d1d1f;
  --axe-bubble-bg: #1c1c1e;
  --axe-bubble-border: rgba(255,255,255,.08);
  --axe-bubble-text: #f5f5f7;
  --thinking-bg: #1c1c1e;
  --status-online: #30d158;
  --status-thinking: #ff9f0a;
  --send-bg: #f5f5f7;
  --send-icon: #1d1d1f;
  --qp-bg: #2c2c2e;
  --qp-border: rgba(255,255,255,.08);
  --qp-text: #aeaeb2;
  --qp-hover-bg: #f5f5f7;
  --qp-hover-text: #1d1d1f;
  --back-btn-bg: rgba(255,255,255,.08);
  --back-btn-color: #aeaeb2;
  --back-btn-hover: #f5f5f7;
  --back-btn-hover-text: #1d1d1f;
  --shadow: 0 4px 24px rgba(0,0,0,.3);
}

/* ── RESET ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100%;
  -webkit-font-smoothing:antialiased;
  transition:background var(--transition),color var(--transition);
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;
  background:var(--bg2);
  border-bottom:1px solid var(--divider);
  flex-shrink:0;
  box-shadow:var(--shadow);
}
.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--nav-bg);
  display:grid;place-items:center;flex-shrink:0;
}
.logo-icon svg{width:20px;height:20px;}
.back-btn{
  width:34px;height:34px;border-radius:10px;
  background:var(--back-btn-bg);
  border:1px solid var(--divider);
  display:grid;place-items:center;flex-shrink:0;
  color:var(--back-btn-color);text-decoration:none;
  transition:all var(--transition);
}
.back-btn:hover{background:var(--back-btn-hover);color:var(--back-btn-hover-text);border-color:transparent;}
.back-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.2;}
.header-text{}
.header-title{
  font-family:'Anton',sans-serif;font-size:17px;
  letter-spacing:1px;color:var(--text);
}
.header-sub{font-size:11px;color:var(--text3);margin-top:1px}
.status{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--text3);
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--status-online);
  animation:pulse 2.4s ease-in-out infinite;
}
.status-dot.thinking{background:var(--status-thinking);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CHAT AREA ── */
.chat-area{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:20px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}

/* ── MESSAGES ── */
.msg{display:flex;gap:10px;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg.user{flex-direction:row-reverse}

.msg-avatar{
  width:32px;height:32px;border-radius:10px;
  display:grid;place-items:center;
  flex-shrink:0;font-size:13px;font-weight:700;
  align-self:flex-end;
}
.msg.axe .msg-avatar{
  background:var(--nav-bg);
  color:var(--nav-text);
  font-family:'Anton',sans-serif;font-size:10px;letter-spacing:.5px;
}
.msg.user .msg-avatar{
  background:var(--badge-bg);color:var(--text2);
}

.msg-bubble{
  max-width:78%;padding:12px 16px;border-radius:16px;
  font-size:13.5px;line-height:1.6;
}
.msg.axe .msg-bubble{
  background:var(--axe-bubble-bg);
  border:1px solid var(--axe-bubble-border);
  color:var(--axe-bubble-text);
  border-bottom-left-radius:4px;
  box-shadow:var(--shadow);
}
.msg.user .msg-bubble{
  background:var(--user-bubble-bg);
  color:var(--user-bubble-text);
  border-bottom-right-radius:4px;
}

.msg-time{
  font-size:10px;color:var(--text3);
  margin-top:4px;
  text-align:right;
}
.msg.axe .msg-time{text-align:left}

/* Axe message formatting */
.msg.axe .msg-bubble strong{color:var(--text);font-weight:600}
.msg.axe .msg-bubble .highlight{color:var(--up);font-weight:600}
.msg.axe .msg-bubble .warn{color:var(--down);font-weight:600}

/* Thinking indicator */
.thinking-bubble{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;
  background:var(--thinking-bg);
  border:1px solid var(--axe-bubble-border);
  border-radius:16px;border-bottom-left-radius:4px;
  font-size:12px;color:var(--text3);
  max-width:78%;
  box-shadow:var(--shadow);
}
.thinking-dots{display:flex;gap:4px}
.thinking-dots span{
  width:5px;height:5px;border-radius:50%;
  background:var(--text3);opacity:.5;
  animation:dot 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── INPUT AREA ── */
.input-area{
  padding:12px 16px 16px;
  background:var(--bg2);
  border-top:1px solid var(--divider);
  flex-shrink:0;
  position:sticky;
  bottom:0;
  z-index:100;
}
.input-row{
  display:flex;gap:10px;align-items:flex-end;
}
.input-wrap{flex:1;position:relative}
textarea{
  width:100%;
  background:var(--input-bg);
  border:1.5px solid var(--input-border);
  border-radius:14px;
  padding:12px 16px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  resize:none;
  outline:none;
  min-height:48px;max-height:120px;
  line-height:1.5;
  transition:border-color var(--transition);
}
textarea::placeholder{color:var(--text3)}
textarea:focus{border-color:var(--input-border-focus)}
.send-btn{
  width:48px;height:48px;border-radius:14px;
  background:var(--send-bg);
  border:none;cursor:pointer;
  display:grid;place-items:center;
  flex-shrink:0;
  transition:opacity var(--transition),transform .15s;
  box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.send-btn:hover{opacity:.85;transform:translateY(-1px)}
.send-btn:active{transform:translateY(0)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px;stroke:var(--send-icon);fill:none;stroke-width:2}

/* Quick prompts */
.quick-prompts{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;
}
.qp{
  font-size:11px;padding:5px 11px;border-radius:var(--radius-pill);
  background:var(--qp-bg);
  border:1px solid var(--qp-border);
  color:var(--qp-text);cursor:pointer;
  transition:all var(--transition);white-space:nowrap;
  font-family:'DM Sans',sans-serif;
}
.qp:hover{background:var(--qp-hover-bg);color:var(--qp-hover-text);border-color:transparent;}

/* ── WELCOME ── */
.welcome{
  text-align:center;padding:30px 20px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.welcome-icon{
  width:56px;height:56px;border-radius:16px;
  background:var(--nav-bg);
  display:grid;place-items:center;
  box-shadow:0 8px 24px rgba(0,0,0,.15);
  margin-bottom:4px;
}
.welcome-icon svg{width:26px;height:26px;}
.welcome h2{
  font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.5px;
  color:var(--text);
}
.welcome p{font-size:13px;color:var(--text2);max-width:320px;line-height:1.6}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="/dashboard" class="back-btn" title="Back to Dashboard">
    <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
  </a>
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--nav-text)" stroke-width="2.2">
      <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
    </svg>
  </div>
  <div class="header-text">
    <div class="header-title">AXE FINANCE — AXE</div>
    <div class="header-sub">Your personal finance advisor</div>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--nav-text)" stroke-width="2.2">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
      </svg>
    </div>
    <h2>AXE IS READY</h2>
    <p>Ask me anything about your finances. I have your real-time data.</p>
  </div>
</div>

<!-- INPUT AREA -->
<div class="input-area">
  <div class="quick-prompts">
    <div class="qp" onclick="sendQuick(this)">How am I doing this month?</div>
    <div class="qp" onclick="sendQuick(this)">Where am I overspending?</div>
    <div class="qp" onclick="sendQuick(this)">Review my subscriptions</div>
    <div class="qp" onclick="sendQuick(this)">How much did I spend on food?</div>
    <div class="qp" onclick="sendQuick(this)">Give me a full financial review</div>
  </div>
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Ask your CFO anything…" rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
    </button>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const CFO_API_ENDPOINT = '/api/cfo-chat';

// ── CONVERSATION HISTORY ──────────────────────────────────────────────────────
let conversationHistory = [];
const MAX_HISTORY = 10;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getTime() {
  return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function formatCFOText(text) {
  text = text.replace(/฿[\d,]+(?:\.\d{2})?/g, '<strong>$&</strong>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function setStatus(thinking) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (thinking) {
    dot.className = 'status-dot thinking';
    text.textContent = 'Thinking…';
  } else {
    dot.className = 'status-dot';
    text.textContent = 'Ready';
  }
}

// ── RENDER MESSAGES ──────────────────────────────────────────────────────────
function appendMessage(role, text) {
  const area = document.getElementById('chatArea');
  const welcome = area.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role === 'cfo' || role === 'axe' ? 'axe' : role}`;

  if (role === 'cfo' || role === 'axe') {
    div.innerHTML = `
      <div class="msg-avatar">AXE</div>
      <div>
        <div class="msg-bubble">${formatCFOText(text)}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar">M</div>
      <div>
        <div class="msg-bubble">${text}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
  }

  area.appendChild(div);
  scrollToBottom();
}

function showThinking() {
  const area = document.getElementById('chatArea');
  const welcome = area.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg axe';
  div.id = 'thinkingMsg';
  div.innerHTML = `
    <div class="msg-avatar">AXE</div>
    <div class="thinking-bubble">
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
      <span>Consulting the team…</span>
    </div>`;
  area.appendChild(div);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinkingMsg');
  if (el) el.remove();
}

// ── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);

  conversationHistory.push({ role: 'user', content: text });
  if (conversationHistory.length > MAX_HISTORY) {
    conversationHistory = conversationHistory.slice(-MAX_HISTORY);
  }

  sendBtn.disabled = true;
  setStatus(true);
  showThinking();

  try {
    const response = await fetch(CFO_API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || data.reply || `Server error: ${response.status}`);
    }

    const reply = data.reply || 'Sorry, I encountered an error. Please try again.';

    conversationHistory.push({ role: 'assistant', content: reply });
    if (conversationHistory.length > MAX_HISTORY) {
      conversationHistory = conversationHistory.slice(-MAX_HISTORY);
    }

    removeThinking();
    setStatus(false);
    appendMessage('axe', reply);

  } catch (err) {
    removeThinking();
    setStatus(false);
    appendMessage('axe', `Error: ${err.message}`);
    console.error('CFO error:', err);
  }

  sendBtn.disabled = false;
  input.focus();
}

function sendQuick(el) {
  const input = document.getElementById('userInput');
  input.value = el.textContent;
  sendMessage();
}

// ── INPUT AUTO-RESIZE ─────────────────────────────────────────────────────────
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
