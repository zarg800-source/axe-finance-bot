<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Axe Finance — Axe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:#080d1a;
  color:#e4ecf7;
  display:flex;
  flex-direction:column;
  height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;gap:12px;
  padding:16px 20px;
  background:#0f1729;
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.logo{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg,#0052FF,#1A80FF);
  display:grid;place-items:center;flex-shrink:0;
}
.back-btn{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  display:grid;place-items:center;flex-shrink:0;
  color:#7a8fad;text-decoration:none;
  transition:all .18s;
}
.back-btn:hover{background:rgba(0,82,255,.15);color:#60a5fa;border-color:rgba(0,82,255,.3)}
.header-text{}
.header-title{
  font-family:'Anton',sans-serif;font-size:17px;
  letter-spacing:1px;
  background:linear-gradient(135deg,#0052FF,#1A80FF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-sub{font-size:11px;color:#7a8fad;margin-top:1px}
.status{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  font-size:11px;color:#7a8fad;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:#4ade80;
  animation:pulse 2.4s ease-in-out infinite;
}
.status-dot.thinking{background:#f59e0b;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MANAGERS STRIP ── */
.managers-strip{
  padding:10px 20px;
  background:#0a1020;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;gap:6px;flex-wrap:wrap;
  flex-shrink:0;
}
.manager-tag{
  font-size:10px;font-weight:500;
  padding:3px 9px;border-radius:999px;
  background:rgba(0,82,255,.1);
  border:1px solid rgba(0,82,255,.2);
  color:#60a5fa;
  letter-spacing:.3px;
  transition:all .2s;
}
.manager-tag.active{
  background:rgba(0,82,255,.25);
  border-color:rgba(0,82,255,.5);
  color:#93c5fd;
}

/* ── CHAT AREA ── */
.chat-area{
  flex:1;overflow-y:auto;
  padding:20px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ── MESSAGES ── */
.msg{display:flex;gap:10px;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg.user{flex-direction:row-reverse}

.msg-avatar{
  width:34px;height:34px;border-radius:10px;
  display:grid;place-items:center;
  flex-shrink:0;font-size:13px;font-weight:700;
  align-self:flex-end;
}
.msg.axe .msg-avatar{
  background:linear-gradient(135deg,#0052FF,#1A80FF);
  color:#fff;font-family:'Anton',sans-serif;font-size:11px;letter-spacing:.5px;
}
.msg.user .msg-avatar{
  background:#1a2640;color:#60a5fa;
}

.msg-bubble{
  max-width:78%;padding:13px 16px;border-radius:16px;
  font-size:13.5px;line-height:1.6;
}
.msg.axe .msg-bubble{
  background:#0f1729;
  border:1px solid rgba(0,82,255,.15);
  color:#e4ecf7;
  border-bottom-left-radius:4px;
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,#0052FF,#1A80FF);
  color:#fff;
  border-bottom-right-radius:4px;
}

.msg-time{
  font-size:10px;color:#3d5070;
  margin-top:4px;
  text-align:right;
}
.msg.axe .msg-time{text-align:left}

/* CFO message formatting */
.msg.axe .msg-bubble strong{color:#60a5fa;font-weight:600}
.msg.axe .msg-bubble .highlight{color:#4ade80;font-weight:600}
.msg.axe .msg-bubble .warn{color:#f87171;font-weight:600}
.msg.axe .msg-bubble .neutral{color:#f59e0b;font-weight:600}

/* Thinking indicator */
.thinking-bubble{
  display:flex;align-items:center;gap:8px;
  padding:13px 16px;
  background:#0f1729;
  border:1px solid rgba(0,82,255,.15);
  border-radius:16px;border-bottom-left-radius:4px;
  font-size:12px;color:#7a8fad;
  max-width:78%;
}
.thinking-dots{display:flex;gap:4px}
.thinking-dots span{
  width:5px;height:5px;border-radius:50%;
  background:#0052FF;opacity:.4;
  animation:dot 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── INPUT AREA ── */
.input-area{
  padding:16px 20px;
  background:#0f1729;
  border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.input-row{
  display:flex;gap:10px;align-items:flex-end;
}
.input-wrap{flex:1;position:relative}
textarea{
  width:100%;
  background:#131e30;
  border:1.5px solid rgba(0,82,255,.2);
  border-radius:14px;
  padding:12px 16px;
  color:#e4ecf7;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  resize:none;
  outline:none;
  min-height:48px;max-height:120px;
  line-height:1.5;
  transition:border-color .2s;
}
textarea::placeholder{color:#3d5070}
textarea:focus{border-color:rgba(0,82,255,.5)}
.send-btn{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,#0052FF,#1A80FF);
  border:none;cursor:pointer;
  display:grid;place-items:center;
  flex-shrink:0;
  transition:opacity .2s,transform .15s;
  box-shadow:0 4px 14px rgba(0,82,255,.35);
}
.send-btn:hover{opacity:.9;transform:translateY(-1px)}
.send-btn:active{transform:translateY(0)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}

/* Quick prompts */
.quick-prompts{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;
}
.qp{
  font-size:11px;padding:5px 11px;border-radius:999px;
  background:rgba(0,82,255,.08);
  border:1px solid rgba(0,82,255,.18);
  color:#60a5fa;cursor:pointer;
  transition:all .18s;white-space:nowrap;
}
.qp:hover{background:rgba(0,82,255,.2);border-color:rgba(0,82,255,.4)}

/* ── WELCOME ── */
.welcome{
  text-align:center;padding:30px 20px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.welcome-icon{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,#0052FF,#1A80FF);
  display:grid;place-items:center;
  box-shadow:0 8px 24px rgba(0,82,255,.35);
  margin-bottom:4px;
}
.welcome h2{
  font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.5px;
  background:linear-gradient(135deg,#0052FF,#1A80FF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.welcome p{font-size:13px;color:#7a8fad;max-width:320px;line-height:1.6}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="/dashboard" class="back-btn" title="Back to Dashboard">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15,18 9,12 15,6"/></svg>
  </a>
  <div class="header-text">
    <div class="header-title">AXE FINANCE — AXE</div>
    <div class="header-sub">Your personal finance advisor, backed by 10 specialists</div>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</div>



<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="welcome">
    <h2>AXE IS READY</h2>
  </div>
</div>

<!-- INPUT AREA -->
<div class="input-area">
  <div class="quick-prompts">
    <div class="qp" onclick="sendQuick(this)">How am I doing this month?</div>
    <div class="qp" onclick="sendQuick(this)">Where am I overspending?</div>
    <div class="qp" onclick="sendQuick(this)">Review my subscriptions</div>
    <div class="qp" onclick="sendQuick(this)">How much did I spend on food?</div>
    <div class="qp" onclick="sendQuick(this)">Give me a full financial review</div>
  </div>
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Ask your CFO anything..." rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
    </button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// AXE FINANCE CFO CHATBOT
// Backend: Flask (render_main.py) → Gemini 3.5 Flash API
// Data: Real-time from /api/cfo-data endpoint (pulls from finance.db)
// ══════════════════════════════════════════════════════════════════════════════

// ── CONFIG ────────────────────────────────────────────────────────────────────
const CFO_API_ENDPOINT = '/api/cfo-chat';  // Flask backend route
const CFO_DATA_ENDPOINT = '/api/cfo-data'; // Fetches real financial data

// ── CONVERSATION HISTORY (keep last 10 messages to save tokens) ──────────────
let conversationHistory = [];
const MAX_HISTORY = 10; // Keep last 10 messages (5 exchanges)

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getTime() {
  return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function formatCFOText(text) {
  // Bold ฿ amounts
  text = text.replace(/฿[\d,]+(?:\.\d{2})?/g, '<strong>$&</strong>');
  // Bold **text**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Newlines
  text = text.replace(/\n/g, '<br>');
  return text;
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function setStatus(thinking) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (thinking) {
    dot.className = 'status-dot thinking';
    text.textContent = 'Consulting managers…';
  } else {
    dot.className = 'status-dot';
    text.textContent = 'Ready';
  }
}

function activateManagers(active = false) {
  document.querySelectorAll('.manager-tag').forEach((tag, i) => {
    if (active) {
      setTimeout(() => tag.classList.add('active'), i * 80);
    } else {
      tag.classList.remove('active');
    }
  });
}

// ── RENDER MESSAGES ──────────────────────────────────────────────────────────
function appendMessage(role, text) {
  const area = document.getElementById('chatArea');
  const welcome = area.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role === 'cfo' ? 'axe' : role}`;

  if (role === 'cfo' || role === 'axe') {
    div.innerHTML = `
      <div class="msg-avatar">AXE</div>
      <div>
        <div class="msg-bubble">${formatCFOText(text)}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar">M</div>
      <div>
        <div class="msg-bubble">${text}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
  }

  area.appendChild(div);
  scrollToBottom();
}

function showThinking() {
  const area = document.getElementById('chatArea');
  const welcome = area.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg axe';
  div.id = 'thinkingMsg';
  div.innerHTML = `
    <div class="msg-avatar">AXE</div>
    <div class="thinking-bubble">
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
      <span>Consulting the team…</span>
    </div>`;
  area.appendChild(div);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinkingMsg');
  if (el) el.remove();
}

// ── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  // Clear input
  input.value = '';
  input.style.height = 'auto';

  // Show user message
  appendMessage('user', text);

  // Add to history (trim to MAX_HISTORY)
  conversationHistory.push({ role: 'user', content: text });
  if (conversationHistory.length > MAX_HISTORY) {
    conversationHistory = conversationHistory.slice(-MAX_HISTORY);
  }

  // UI state
  sendBtn.disabled = true;
  setStatus(true);
  activateManagers(true);
  showThinking();

  try {
    // ── Call Flask backend which handles Gemini API + real data ──
    const response = await fetch(CFO_API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: conversationHistory
      })
    });

    if (!response.ok) {
      throw new Error(`Server error: ${response.status}`);
    }

    const data = await response.json();
    const reply = data.reply || 'Sorry, I encountered an error. Please try again.';

    // Add assistant reply to history
    conversationHistory.push({ role: 'assistant', content: reply });
    if (conversationHistory.length > MAX_HISTORY) {
      conversationHistory = conversationHistory.slice(-MAX_HISTORY);
    }

    removeThinking();
    activateManagers(false);
    setStatus(false);
    appendMessage('axe', reply);

  } catch (err) {
    removeThinking();
    activateManagers(false);
    setStatus(false);
    appendMessage('axe', 'Connection error. Please check your network and try again.');
    console.error(err);
  }

  sendBtn.disabled = false;
  input.focus();
}

function sendQuick(el) {
  const input = document.getElementById('userInput');
  input.value = el.textContent;
  sendMessage();
}

// ── INPUT AUTO-RESIZE ────────────────────────────────────────────────────────
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
